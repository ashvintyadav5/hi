<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my world</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .profile-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #3498db;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #34495e;
            font-size: 24px;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Heading -->
        <h1>Welcome to my world</h1>
        
        <!-- Aapka Photo -->
        <img src="IMG-20260718-WA0002.jpg" alt="Ashvint Kumar Yadav" class="profile-pic">
        
        <!-- Aapka Naam -->
        <h2>Ashvint Kumar Yadav</h2>
    </div>

</body>
</html>
